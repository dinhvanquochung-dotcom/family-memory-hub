<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Family Memory Hub</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .login-section {
            padding: 60px 20px;
            text-align: center;
        }

        .login-section h2 {
            margin-bottom: 30px;
            color: #333;
        }

        #g_id_onload {
            display: flex;
            justify-content: center;
        }

        .main-content {
            display: none;
            padding: 40px 20px;
        }

        .main-content.active {
            display: block;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info-left {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-details h3 {
            margin-bottom: 5px;
            color: #333;
        }

        .user-details p {
            color: #666;
            font-size: 0.9em;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #ff5252;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .upload-section {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-section:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }

        .upload-section input {
            display: none;
        }

        .upload-section p {
            color: #666;
            margin-bottom: 10px;
        }

        .upload-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }

        .upload-btn:hover {
            background: #764ba2;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f0f0;
            aspect-ratio: 1;
        }

        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stat-card p {
            opacity: 0.9;
        }

        .search-section {
            margin-bottom: 20px;
        }

        .search-section input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .album-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .album-card:hover {
            background: #e9ecef;
            transform: translateY(-5px);
        }

        .album-card h4 {
            margin-bottom: 5px;
            color: #333;
        }

        .album-card p {
            color: #999;
            font-size: 0.9em;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .user-info {
                flex-direction: column;
                gap: 15px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Family Memory Hub</h1>
            <p>Lưu giữ khoảnh khắc Gia đình, chia sẻ dòng thời gian</p>
        </div>

        <!-- Login Section -->
        <div class="login-section" id="loginSection">
            <h2>Đăng nhập để bắt đầu</h2>
            <div id="g_id_onload"
                 data-client_id="488152283026-qhe0iunbkjt17v3ktcalh5v71b5t6mgi.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="standard"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="mainContent">
            <!-- User Info -->
            <div class="user-info">
                <div class="user-info-left">
                    <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
                    <div class="user-details">
                        <h3 id="userName"></h3>
                        <p id="userEmail"></p>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">Đăng xuất</button>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('gallery')">📷 Thư viện</button>
                <button class="tab-btn" onclick="switchTab('upload')">📤 Tải lên</button>
                <button class="tab-btn" onclick="switchTab('albums')">📁 Album</button>
                <button class="tab-btn" onclick="switchTab('stats')">📊 Thống kê</button>
            </div>

            <!-- Gallery Tab -->
            <div class="tab-content active" id="galleryTab">
                <div class="search-section">
                    <input type="text" id="searchInput" placeholder="Tìm ảnh theo tên hoặc ngày..." onkeyup="filterGallery()">
                </div>
                <div class="gallery" id="gallery">
                    <div class="gallery-empty">Chưa có ảnh nào. Hãy tải lên ảnh đầu tiên!</div>
                </div>
            </div>

            <!-- Upload Tab -->
            <div class="tab-content" id="uploadTab">
                <div id="message"></div>
                <div class="upload-section" onclick="document.getElementById('fileInput').click()">
                    <p>📁 Kéo ảnh/video vào đây hoặc click để chọn</p>
                    <button class="upload-btn">Chọn tệp</button>
                    <input type="file" id="fileInput" multiple accept="image/*,video/*" onchange="handleFileSelect(event)">
                </div>
            </div>

            <!-- Albums Tab -->
            <div class="tab-content" id="albumsTab">
                <div class="albums-grid" id="albumsGrid">
                    <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #999;">
                        Chưa có album nào
                    </div>
                </div>
            </div>

            <!-- Stats Tab -->
            <div class="tab-content" id="statsTab">
                <div class="stats">
                    <div class="stat-card">
                        <h3 id="photoCount">0</h3>
                        <p>Ảnh</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="videoCount">0</h3>
                        <p>Video</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="albumCount">0</h3>
                        <p>Album</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let userProfile = null;
        let accessToken = null;

        function handleCredentialResponse(response) {
            console.log('Login successful');
            const token = response.credential;
            accessToken = token;
            
            // Decode JWT (basic decode, not secure for production)
            const payload = JSON.parse(atob(token.split('.')[1]));
            
            userProfile = {
                name: payload.name,
                email: payload.email,
                picture: payload.picture
            };

            // Update UI
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainContent').classList.add('active');
            document.getElementById('userName').textContent = userProfile.name;
            document.getElementById('userEmail').textContent = userProfile.email;
            document.getElementById('userAvatar').src = userProfile.picture;

            loadGallery();
            updateStats();
        }

        function logout() {
            userProfile = null;
            accessToken = null;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('mainContent').classList.remove('active');
            document.getElementById('gallery').innerHTML = '<div class="gallery-empty">Chưa có ảnh nào. Hãy tải lên ảnh đầu tiên!</div>';
            
            google.accounts.id.disableAutoSelect();
        }

        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');
        }

        function handleFileSelect(event) {
            const files = event.target.files;
            const messageDiv = document.getElementById('message');

            if (files.length === 0) return;

            messageDiv.className = 'message success';
            messageDiv.textContent = `✅ ${files.length} tệp được chọn và sẽ được lưu vào Google Drive của bạn!`;

            // In production, here you would upload to Google Drive
            console.log('Files to upload:', files);

            // Simulate upload
            setTimeout(() => {
                loadGallery();
                updateStats();
                document.getElementById('fileInput').value = '';
            }, 1000);
        }

        function loadGallery() {
            const gallery = document.getElementById('gallery');
            
            // In production, fetch from Google Drive API
            // For now, show placeholder
            gallery.innerHTML = '<div class="gallery-empty">📸 Gallery đang được tải...</div>';

            // Simulate loading
            setTimeout(() => {
                gallery.innerHTML = '<div class="gallery-empty">Chưa có ảnh nào. Hãy tải lên ảnh đầu tiên!</div>';
            }, 500);
        }

        function filterGallery() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            // Filter logic here
            console.log('Searching for:', searchTerm);
        }

        function updateStats() {
            // In production, fetch real stats from Google Drive
            document.getElementById('photoCount').textContent = '0';
            document.getElementById('videoCount').textContent = '0';
            document.getElementById('albumCount').textContent = '0';
        }

        // Initialize Google Sign-In
        window.onload = function() {
            google.accounts.id.initialize({
                client_id: '488152283026-qhe0iunbkjt17v3ktcalh5v71b5t6mgi.apps.googleusercontent.com',
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.querySelector('.g_id_signin'),
                {
                    theme: 'outline',
                    size: 'large',
                    text: 'signin'
                }
            );
        };
    </script>
</body>
</html>
